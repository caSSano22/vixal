<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="vixal-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FF66"/>
      <stop offset="50%" stop-color="#00C805"/>
      <stop offset="100%" stop-color="#008003"/>
    </linearGradient>

    <linearGradient id="vixal-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#0088FF"/>
    </linearGradient>

    <linearGradient id="vixal-dark-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0D0F14"/>
      <stop offset="100%" stop-color="#040405"/>
    </linearGradient>

    <radialGradient id="vixal-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FF66" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#00C805" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Outer Dark Squircle Container -->
  <rect x="16" y="16" width="480" height="480" rx="120" fill="url(#vixal-dark-bg)" stroke="rgba(255, 255, 255, 0.12)" stroke-width="6"/>
  <rect x="24" y="24" width="464" height="464" rx="112" fill="none" stroke="rgba(0, 200, 5, 0.3)" stroke-width="3"/>

  <!-- Radial Glow -->
  <circle cx="256" cy="256" r="200" fill="url(#vixal-glow)"/>

  <!-- Network Grid Accent Lines -->
  <line x1="130" y1="140" x2="382" y2="140" stroke="rgba(255, 255, 255, 0.08)" stroke-width="4" stroke-dasharray="8 8"/>
  <line x1="130" y1="140" x2="256" y2="380" stroke="rgba(0, 200, 5, 0.2)" stroke-width="4"/>
  <line x1="382" y1="140" x2="256" y2="380" stroke="rgba(0, 212, 255, 0.2)" stroke-width="4"/>

  <!-- Geometric V Wings -->
  <!-- Left Wing (Green Gradient) -->
  <path d="M 130 140 L 214 140 L 256 348 L 200 348 Z" fill="url(#vixal-green)"/>
  
  <!-- Right Wing (Cyan Gradient) -->
  <path d="M 382 140 L 298 140 L 256 348 L 312 348 Z" fill="url(#vixal-cyan)"/>

  <!-- Center Core Prism Shard -->
  <path d="M 256 160 L 290 140 L 256 380 L 222 140 Z" fill="#FFFFFF" opacity="0.95"/>

  <!-- RWA Intelligence Core Node -->
  <circle cx="256" cy="230" r="32" fill="#040405" stroke="url(#vixal-green)" stroke-width="6"/>
  <circle cx="256" cy="230" r="18" fill="#00FF66"/>
  <circle cx="256" cy="230" r="8" fill="#FFFFFF"/>

  <!-- Vertex Node Points -->
  <circle cx="130" cy="140" r="14" fill="#00FF66"/>
  <circle cx="382" cy="140" r="14" fill="#00F0FF"/>
  <circle cx="256" cy="380" r="16" fill="#00C805"/>
</svg>
